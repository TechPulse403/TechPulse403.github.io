<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrypt — 404</title>
    <link rel="icon" type="image/png" href="/images/gc.png">
    <meta name="description" content="Xenon — Page not found.">
    <meta name="author" content="Xenon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a28;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --accent-secondary: #7c3aed;
            --text-primary: #e8e8f0;
            --text-secondary: #8b8ba3;
            --border: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(0, 212, 255, 0.08);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(124, 58, 237, 0.08);
            bottom: -80px; left: 100px;
            animation-delay: -7s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(0, 212, 255, 0.05);
            top: 40%; left: 30%;
            animation-delay: -14s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(80px, 15vw, 140px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: fadeInUp 0.8s ease both;
            letter-spacing: -2px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            margin: 20px auto;
            border-radius: 2px;
            animation: fadeInUp 0.8s ease 0.15s both;
        }

        .message {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 36px;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            animation: fadeInUp 0.8s ease 0.45s both;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: #fff;
            box-shadow: 0 4px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.4);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="content">
        <div class="code">404</div>
        <div class="divider"></div>
        <p class="message">Sorry, something went wrong or nothing is here yet.</p>
        <a href="/" class="btn btn-primary">Go Home</a>
    </div>
</body>
</html>
