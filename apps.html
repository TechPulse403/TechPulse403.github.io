<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-435XG5B8ZM"></script>

  window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrypt — Socials</title>
    <link rel="icon" type="image/png" href="/images/gc.png">
    <meta name="description" content="Skrypt Apps — Browse and launch your favorite apps.">
    <meta name="keywords" content="Xenon, Apps, Hub">
    <meta name="author" content="Xenon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="styles/apps.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="imgs/logo.png" alt="logo" height=50px width=50px style="border-radius: 20px;">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" data-label="Home"><i data-lucide="home"></i></a></li>
            <li><a href="games.html" data-label="Games"><i data-lucide="gamepad-2"></i></a></li>
            <li><a href="apps.html" data-label="Apps" class="active"><i data-lucide="layers"></i></a></li>
            <li><a href="music.html" data-label="Music"><i data-lucide="music-4"></i></a></li>
            <li><div class="nav-divider"></div></li>
            <li><a href="chat" data-label="Chat" target="_blank"><i data-lucide="message-square"></i></a></li>
            <li><a href="partners" data-label="Partners"><i data-lucide="handshake"></i></a></li>
            <li><a href="extra" data-label="Extra"><i data-lucide="more-horizontal"></i></a></li>
            <li><a href="settings" data-label="Settings"><i data-lucide="settings"></i></a></li>
        </ul>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1>Socials</h1>
            <p>Check out our socials for more links</p>
        </div>

        <div class="search-bar">
            <i data-lucide="search"></i>
            <input type="text" id="appSearch" placeholder="Search apps..." onkeyup="filterApps()">
        </div>

        <div class="apps-grid" id="appsGrid">
            <a href="www.tiktok.com/@skrypt.services" class="app-card">
                <img src="images/apps/tik.png" alt="Tiktok" class="thumb" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex';">
                <div class="fallback" style="display:none;width:100%;aspect-ratio:16/10;align-items:center;justify-content:center;background:var(--bg-hover);"><img src="images/apps/tik.png" alt="TikTok" style="width:100%;height:100%;object-fit:cover;"></div>
                <div class="info"><p>TikTok</p><div class="launch-hint">Click to Launch</div></div>
            </a>
            <a href="https://discord.gg/W27wU3RFHf" class="app-card">
                <img src="images/apps/discord.png" alt="Discord" class="thumb" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex';">
                <div class="fallback" style="display:none;width:100%;aspect-ratio:16/10;align-items:center;justify-content:center;background:var(--bg-hover);"><img src="images/apps/discord.png" alt="Discord" style="width:100%;height:100%;object-fit:cover;"></div>
                <div class="info"><p>Discord</p><div class="launch-hint">Click to Launch</div></div>
            </a>
        </div>
    </main>

    <script>
        function filterApps() {
            const query = document.getElementById('appSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.app-card');
            cards.forEach(card => {
                const name = card.querySelector('p').textContent.toLowerCase();
                card.style.display = name.includes(query) ? '' : 'none';
            });
        }
        lucide.createIcons();
    </script>
</body>
</html>
