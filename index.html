    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrypt</title>
    <link rel="icon" type="image/png" href="/images/gc.png">
    <meta name="description" content="Skrypt — A sleek, modern hub for games, apps, and more.">

    <meta name="author" content="Skrypt">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="imgs/logo.png" alt="logo" height=50px width=50px style="border-radius: 20px;">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" data-label="Home" class="active"><i data-lucide="home"></i></a></li>
            <li><a href="games.html" data-label="Games"><i data-lucide="gamepad-2"></i></a></li>
            <li><a href="apps.html" data-label="Apps"><i data-lucide="layers"></i></a></li>
            <li><a href="music" data-label="Music"><i data-lucide="music-4"></i></a></li>
            <li><div class="nav-divider"></div></li>
            <li><a href="chat" data-label="Chat" target="_blank"><i data-lucide="message-square"></i></a></li>
            <li><a href="partners" data-label="Partners"><i data-lucide="handshake"></i></a></li>
            <li><a href="extra" data-label="Extra"><i data-lucide="more-horizontal"></i></a></li>
            <li><a href="settings" data-label="Settings"><i data-lucide="settings"></i></a></li>
        </ul>
    </aside>

    <main class="main">
        <div class="hero">
            <div class="hero-badge">
                <span class="pulse"></span>
                Early Access
            </div>
            <h1>Skrypt</h1>
            <p>The new era of gaming sites</p>
            <div class="hero-actions">
                <a href="games" class="btn btn-primary">
                    <i data-lucide="gamepad-2"></i>
                    Explore Games
                </a>
                <a href="apps" class="btn btn-secondary">
                    <i data-lucide="layers"></i>
                    Browse Apps
                </a>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value">1K+</div>
                <div class="stat-label">Games</div>
            </div>
            <div class="stat">
                <div class="stat-value">2+</div>
                <div class="stat-label">Apps</div>
            </div>
            <div class="stat">
                <div class="stat-value">1+</div>
                <div class="stat-label">Users</div>
            </div>
        </div>

        <div class="scroll-hint">
            <span>Scroll</span>
            <i data-lucide="chevron-down"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
        <!-- Global Music Player Bar -->
    <div class="music-player hidden" id="musicPlayer">
        <div class="player-track">
            <img src="" alt="" class="player-thumb" id="playerThumb">
            <div class="player-meta">
                <h4 id="playerTitle">No song playing</h4>
                <span id="playerArtist">Select a song</span>
            </div>
        </div>
        <div class="player-controls">
            <button class="player-btn" onclick="prevSong()" title="Previous">
                <i data-lucide="skip-back"></i>
            </button>
            <button class="player-btn play-btn" onclick="togglePlay()" title="Play/Pause">
                <i data-lucide="play" id="playIcon"></i>
            </button>
            <button class="player-btn" onclick="nextSong()" title="Next">
                <i data-lucide="skip-forward"></i>
            </button>
        </div>
        <div class="player-progress">
            <span id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="totalTime">0:00</span>
        </div>
        <div class="player-volume">
            <i data-lucide="volume-2"></i>
            <div class="volume-slider" id="volumeSlider" onclick="setVolume(event)">
                <div class="volume-fill" id="volumeFill"></div>
            </div>
        </div>
        <div class="player-skip">
            <button class="skip-btn" onclick="skipSong()" title="Skip to next song">
                <i data-lucide="fast-forward"></i>
                Skip
            </button>
        </div>
    </div>

    <script>
        let audio = new Audio();
        let isPlaying = false;
        let currentSongIndex = 0;
        let currentSongs = [];
        let currentArtist = '';

        function togglePlay() {
            if (!audio.src) return;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('playIcon').setAttribute('data-lucide', 'play');
            } else {
                audio.play();
                isPlaying = true;
                document.getElementById('playIcon').setAttribute('data-lucide', 'pause');
            }
            lucide.createIcons();
        }

        function nextSong() {
            if (currentSongs.length === 0) return;
            currentSongIndex = (currentSongIndex + 1) % currentSongs.length;
            loadAndPlay(currentSongs[currentSongIndex]);
        }

        function prevSong() {
            if (currentSongs.length === 0) return;
            currentSongIndex = (currentSongIndex - 1 + currentSongs.length) % currentSongs.length;
            loadAndPlay(currentSongs[currentSongIndex]);
        }

        function skipSong() {
            nextSong();
        }

        function loadAndPlay(song) {
            if (!song) return;
            audio.src = song.file;
            audio.play();
            isPlaying = true;
            document.getElementById('playerTitle').textContent = song.title;
            document.getElementById('playerArtist').textContent = currentArtist;
            document.getElementById('totalTime').textContent = song.duration || '0:00';
            document.getElementById('playIcon').setAttribute('data-lucide', 'pause');
            document.getElementById('musicPlayer').classList.remove('hidden');
            lucide.createIcons();
        }

        function seek(event) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }

        function setVolume(event) {
            const slider = document.getElementById('volumeSlider');
            const rect = slider.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            audio.volume = percent;
            document.getElementById('volumeFill').style.width = (percent * 100) + '%';
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                const mins = Math.floor(audio.currentTime / 60);
                const secs = Math.floor(audio.currentTime % 60);
                document.getElementById('currentTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        });

        audio.addEventListener('ended', () => {
            nextSong();
        });

        lucide.createIcons();
    </script>

</body>
</html>
